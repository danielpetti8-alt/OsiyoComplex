<!-- core/templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Osiyo Complex{% endblock %}</title>
    
    <!-- Favicon (Brauzer ikonasi) -->
    <link rel="icon" type="image/png" href="{% static 'core/images/logo.png' %}">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- AOS Animatsiyalar -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4A85A;
            --gold-dark: #B8924A;
            --gold-light: #E8C988;
            --turquoise: #2EB5A8;
            --turquoise-dark: #1F8F84;
            --turquoise-light: #5FCBC0;
            --dark: #1a1d2e;
            --dark-soft: #2a2e44;
            --light-bg: #f8f9fc;
            --text-dark: #2c3e50;
            --text-muted: #7a869a;
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            overflow-x: hidden;
            margin: 0;
        }

        /* === ASOSIY KONTENT === */
        .main-content {
            padding: 30px 40px;
            animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* === PREMIUM SIDEBAR === */
        .sidebar {
            min-height: calc(100vh - 30px);
            background: linear-gradient(180deg, var(--dark) 0%, var(--dark-soft) 100%);
            color: white;
            border-radius: 24px;
            margin: 15px 0 15px 15px;
            box-shadow: 8px 8px 30px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            width: 280px;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 168, 90, 0.1) 0%, transparent 50%);
            animation: float 6s ease-in-out infinite;
        }

        .sidebar-logo {
            text-align: center;
            padding: 25px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .sidebar-logo img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: white;
            padding: 10px;
            box-shadow: 0 8px 20px rgba(212, 168, 90, 0.3);
            transition: transform 0.4s ease;
        }

        .sidebar-logo img:hover {
            transform: rotate(360deg) scale(1.1);
        }

        .sidebar-logo h5 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            margin-top: 12px;
            margin-bottom: 4px;
            color: var(--gold-light);
            letter-spacing: 1px;
        }

        .sidebar-logo p {
            font-size: 0.75rem;
            color: var(--turquoise-light);
            margin: 0;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sidebar .nav-link {
            color: rgba(255,255,255,0.65);
            padding: 13px 22px;
            border-radius: 12px;
            margin: 4px 15px;
            font-weight: 500;
            font-size: 0.92rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .sidebar .nav-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 0;
            width: 3px;
            background: var(--gold);
            border-radius: 0 3px 3px 0;
            transition: height 0.3s;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: linear-gradient(90deg, rgba(212, 168, 90, 0.2), rgba(46, 181, 168, 0.1));
            color: white;
            transform: translateX(8px);
        }

        .sidebar .nav-link:hover::before,
        .sidebar .nav-link.active::before {
            height: 70%;
        }

        .sidebar .nav-link i {
            margin-right: 12px;
            font-size: 1.15rem;
            width: 22px;
            text-align: center;
        }

        .sidebar-values {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: auto;
        }

        .sidebar-values h6 {
            color: var(--gold-light);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .value-tag {
            display: inline-block;
            background: rgba(46, 181, 168, 0.15);
            color: var(--turquoise-light);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin: 2px;
            border: 1px solid rgba(46, 181, 168, 0.3);
        }

        /* === KARTOCHKALAR === */
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            margin-bottom: 24px;
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.1);
        }

        .card-header {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fc 100%);
            border-bottom: 2px solid #f0f2f7;
            padding: 22px 28px;
            font-weight: 600;
            color: var(--dark);
        }

        /* === STATISTIKA KARTOCHKALARI === */
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            border: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold), var(--gold-dark));
        }
        
        .stat-card.turquoise::before { background: linear-gradient(180deg, var(--turquoise), var(--turquoise-dark)); }
        .stat-card.warning::before { background: linear-gradient(180deg, #f6c23e, #d4a52d); }
        .stat-card.danger::before { background: linear-gradient(180deg, #e74a3b, #c43a2d); }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        .stat-card h6 {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        
        .stat-card h2 {
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: var(--dark);
            margin: 0;
            font-size: 2.5rem;
        }

        .stat-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3.5rem;
            opacity: 0.12;
        }

        .stat-card .stat-icon { color: var(--gold); }
        .stat-card.turquoise .stat-icon { color: var(--turquoise); }
        .stat-card.warning .stat-icon { color: #f6c23e; }
        .stat-card.danger .stat-icon { color: #e74a3b; }

        /* === TUGMALAR === */
        .btn {
            border-radius: 12px;
            padding: 10px 22px;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::after {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-dark) 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(46, 181, 168, 0.35);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--turquoise-dark) 0%, var(--turquoise) 100%);
            box-shadow: 0 8px 25px rgba(46, 181, 168, 0.5);
            transform: translateY(-2px);
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(212, 168, 90, 0.35);
        }

        .btn-gold:hover {
            background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(212, 168, 90, 0.5);
            transform: translateY(-2px);
        }

        .btn-outline-primary {
            color: var(--turquoise-dark);
            border: 2px solid var(--turquoise);
        }

        .btn-outline-primary:hover {
            background: var(--turquoise);
            border-color: var(--turquoise);
        }

        /* === FORMALAR === */
        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 18px;
            border: 2px solid #e3e6f0;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--turquoise);
            box-shadow: 0 0 0 0.25rem rgba(46, 181, 168, 0.2);
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* === LOGIN SAHIFA - SPLIT SCREEN === */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-soft) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .login-left::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(212, 168, 90, 0.2) 0%, transparent 70%);
            animation: float 8s ease-in-out infinite;
        }

        .login-left::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(46, 181, 168, 0.2) 0%, transparent 70%);
            animation: float 10s ease-in-out infinite reverse;
        }

        .login-left-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            max-width: 500px;
        }

        .login-left-logo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: white;
            padding: 20px;
            margin: 0 auto 30px;
            box-shadow: 0 20px 50px rgba(212, 168, 90, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        .login-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-left .tagline {
            font-size: 1.1rem;
            color: var(--turquoise-light);
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .values-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 30px;
        }

        .value-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 10px;
            border-radius: 14px;
            text-align: center;
            transition: all 0.3s;
        }

        .value-card:hover {
            background: rgba(212, 168, 90, 0.15);
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .value-card i {
            font-size: 1.5rem;
            color: var(--gold-light);
            display: block;
            margin-bottom: 5px;
        }

        .value-card span {
            font-size: 0.75rem;
            color: white;
            font-weight: 500;
        }

        .login-right {
            flex: 1;
            background: var(--light-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-form-container {
            width: 100%;
            max-width: 420px;
            animation: slideInUp 0.8s ease;
        }

        .login-form-container h2 {
            font-family: 'Playfair Display', serif;
            color: var(--dark);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-form-container .subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        .input-group-modern {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group-modern i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            z-index: 10;
        }

        .input-group-modern input {
            padding-left: 50px;
            height: 54px;
        }

        .btn-login {
            width: 100%;
            height: 54px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* === JADVAL === */
        .table {
            color: var(--text-dark);
        }
        .table thead th {
            border-bottom: 2px solid #e3e6f0;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 15px;
        }
        .table td {
            vertical-align: middle;
            border-bottom: 1px solid #f0f2f7;
            padding: 15px;
        }
        .table tbody tr {
            transition: all 0.2s;
        }
        .table tbody tr:hover {
            background: rgba(46, 181, 168, 0.05);
            transform: scale(1.005);
        }

        /* === BADGE === */
        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.75rem;
        }

        .bg-success { background: linear-gradient(135deg, #1cc88a, #169c69) !important; }
        .bg-danger { background: linear-gradient(135deg, #e74a3b, #c43a2d) !important; }
        .bg-warning { background: linear-gradient(135deg, var(--gold), var(--gold-dark)) !important; color: white !important; }
        .bg-info { background: linear-gradient(135deg, var(--turquoise), var(--turquoise-dark)) !important; }
        .bg-primary { background: linear-gradient(135deg, var(--turquoise), var(--turquoise-dark)) !important; }

        /* === ALERT === */
        .alert {
            border-radius: 14px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 16px 20px;
        }

        .alert-success {
            background: linear-gradient(135deg, rgba(28, 200, 138, 0.15), rgba(28, 200, 138, 0.05));
            color: #0a7c4e;
            border-left: 4px solid #1cc88a;
        }

        .alert-danger {
            background: linear-gradient(135deg, rgba(231, 74, 59, 0.15), rgba(231, 74, 59, 0.05));
            color: #8c1c12;
            border-left: 4px solid #e74a3b;
        }

        /* === PAGE HEADER === */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f2f7;
        }

        .page-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--dark);
            font-weight: 700;
            margin: 0;
        }

        .page-header h3 i {
            color: var(--gold);
            margin-right: 10px;
        }

        /* === IMTIHON STYLES === */
        .exam-timer {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            padding: 20px 30px;
            border-bottom: 3px solid var(--turquoise);
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        
        .timer-display {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--turquoise-dark);
            font-family: 'Playfair Display', serif;
        }
        
        .timer-display.warning { color: var(--gold-dark); animation: pulse 2s infinite; }
        .timer-display.danger { color: #e74a3b; animation: pulse 1s infinite; }

        .question-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-left: 5px solid var(--turquoise);
        }
        
        .option-label {
            display: block;
            padding: 16px 20px;
            margin: 10px 0;
            border: 2px solid #e3e6f0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fc;
        }
        
        .option-label:hover {
            border-color: var(--turquoise);
            background: rgba(46, 181, 168, 0.05);
            transform: translateX(5px);
        }
        
        .option-label:has(input:checked) {
            border-color: var(--turquoise);
            background: linear-gradient(135deg, rgba(46, 181, 168, 0.15), rgba(46, 181, 168, 0.05));
            font-weight: 600;
        }
        
        .result-correct { 
            background: linear-gradient(135deg, rgba(28, 200, 138, 0.1), rgba(28, 200, 138, 0.02)) !important; 
            border-left-color: #1cc88a !important;
        }
        .result-wrong { 
            background: linear-gradient(135deg, rgba(231, 74, 59, 0.1), rgba(231, 74, 59, 0.02)) !important; 
            border-left-color: #e74a3b !important;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; }
            .login-left { padding: 30px 20px; }
            .login-left-logo { width: 120px; height: 120px; }
            .login-left h1 { font-size: 2rem; }
            .values-grid { grid-template-columns: repeat(2, 1fr); }
            .sidebar { width: 100%; margin: 10px; }
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--turquoise), var(--turquoise-dark)); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--turquoise-dark); }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    {% block body %}{% endblock %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animatsiyalar -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // Xabarlarni avtomatik yopish
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
