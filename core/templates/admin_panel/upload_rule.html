<!-- core/templates/admin_panel/upload_rule.html -->
{% extends 'base.html' %}

{% block title %}Qoida yuklash — Admin Panel{% endblock %}

{% block body %}
<div class="d-flex">
    {% include 'sidebar_admin.html' %}
    
    <div class="main-content flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3><i class="bi bi-upload"></i> Qoida hujjati yuklash</h3>
            <a href="{% url 'manage_rules' %}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Orqaga
            </a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Hujjat nomi *</label>
                        <input type="text" name="title" class="form-control" 
                               placeholder="masalan: Ichki tartib qoidalari" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Qisqacha tavsif</label>
                        <textarea name="description" class="form-control" rows="3" 
                                  placeholder="Hujjat haqida qisqacha..."></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">PDF fayl *</label>
                        <input type="file" name="pdf_file" class="form-control" accept=".pdf" required>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'manage_rules' %}" class="btn btn-outline-secondary btn-lg">Bekor qilish</a>
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-upload"></i> Yuklash
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
